<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我 - 邸玉龙</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- 添加 Cloudflare Turnstile 脚本引入 -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <!-- 导航栏 -->
    <nav id="navbar" class="navbar">
        <div class="container">
            <a href="index.html" class="logo">邸玉龙的个人网站</a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="about.html">关于我</a>
                <a href="portfolio.html">作品集</a>
                <a href="contact.html" class="active">联系我</a>
            </div>
            <div class="hamburger" id="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- 联系区域 -->
    <section id="contact-form" class="contact-form" style="padding-top: 120px;">
        <div class="container">
            <h2>联系我</h2>
            <!-- 高级保护的联系方式 -->
            <div class="protected-contact advanced-protection">
                <p>邮箱: <span id="protected-email" class="protected">保护中</span></p>
                <p>电话: <span id="protected-phone" class="protected">保护中</span></p>
                
                <!-- Cloudflare Turnstile验证码区域 -->
                <div id="captcha-container" class="captcha-container">
                    <p>请完成验证以查看联系方式</p>
                    <!-- Cloudflare Turnstile小部件 -->
                    <div class="cf-turnstile" data-sitekey="0x4AAAAAABl5_m-LwHEh2NJt"></div>
                    <button id="verify-captcha" class="btn-verify">验证</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 底部区域 -->
    <footer id="contact" class="footer">
        <div class="container">
            <div class="social-links"></div>
            <p class="copyright">&copy; 2025 邸玉龙. 保留所有权利</p>
        </div>
    </footer>

    <!-- 引入自定义JavaScript -->
    <script src="script.js"></script>

    <!-- 高级保护联系方式的脚本 -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 加密的联系方式
            const encryptedEmail = 'MTczNTAzOTA5MkBxcS5jb20='; // 新邮箱的Base64加密值
            const encryptedPhone = 'MTQ3MDQ2NjYzNTY='; // 电话号码保持不变
            
            // IP访问限制
            const MAX_VIEWS = 3; // 每IP最大查看次数
            const VIEW_TIMEOUT = 24 * 60 * 60 * 1000; // 24小时重置
            
            // 验证IP访问次数
            async function checkIpAccess() {
                try {
                    // 调用后端API获取真实IP并检查访问次数
                    const response = await fetch('https://your-backend-api.com/check-access', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'}
                    });
                    const data = await response.json();
                    return data.allowed;
                } catch (error) {
                    console.error('IP访问检查失败:', error);
                    // 出错时默认允许访问
                    return true;
                }
            }
            
            // 解密联系方式
            function decryptContactInfo(encrypted) {
                // 简单的Base64解密
                return atob(encrypted);
            }
            
            // 显示联系方式
            function showContactInfo() {
                
                // 解密并显示邮箱
                const emailElement = document.getElementById('protected-email');
                const decryptedEmail = decryptContactInfo(encryptedEmail);
                emailElement.innerHTML = '<a href="mailto:' + decryptedEmail + '">' + decryptedEmail + '</a>';
                emailElement.classList.remove('protected');
                
                // 解密并显示电话
                const phoneElement = document.getElementById('protected-phone');
                const decryptedPhone = decryptContactInfo(encryptedPhone);
                phoneElement.innerHTML = '<a href="tel:' + decryptedPhone + '">' + decryptedPhone.replace(/(\d{3})(\d{4})(\d{3})/, '$1-$2-$3') + '</a>';
                phoneElement.classList.remove('protected');
                
                // 隐藏验证码
                document.getElementById('captcha-container').style.display = 'none';
            }
            
            // 验证Cloudflare Turnstile
            document.getElementById('verify-captcha').addEventListener('click', function() {
                // 获取Turnstile响应令牌
                const token = document.querySelector('input[name="cf-turnstile-response"]').value;
                
                if (!token) {
                    alert('请先完成验证。');
                    return;
                }
                
                // 发送令牌到后端验证 (实际应用中需要后端验证)
                // 这里为了简化示例，我们直接假设验证成功
                // 在实际应用中，您需要将token发送到您的服务器，并使用Cloudflare秘密密钥进行验证
                
                // 延迟1秒显示，增加爬虫难度
                setTimeout(showContactInfo, 1000);
            });
        });
    </script>
</body>
</html>
